quarkus.application.name=credit-model-trainer
quarkus.http.port=8086

# PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRES_USER:credit}
quarkus.datasource.password=${POSTGRES_PASSWORD:credit123}
quarkus.datasource.jdbc.url=${JDBC_URL:jdbc:postgresql://localhost:5432/credit_risk}

# Hibernate/Flyway
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

# OpenAPI
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true

# MinIO / S3 local
app.storage.s3.endpoint=http://localhost:9000
app.storage.s3.access-key=${MINIO_ROOT_USER:minioadmin}
app.storage.s3.secret-key=${MINIO_ROOT_PASSWORD:minioadmin123}
app.storage.s3.bucket=${MINIO_BUCKET:credit-models}
app.storage.s3.region=us-east-1

# Diretório temporário para modelos antes do upload
app.models.local-dir=target/models